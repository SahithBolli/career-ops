version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: careerops
      POSTGRES_USER: careerops
      POSTGRES_PASSWORD: careerops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careerops"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/careerops
      DATABASE_USER: careerops
      DATABASE_PASSWORD: careerops
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
